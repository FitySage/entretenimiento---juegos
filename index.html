<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú - Juegos en Familia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .card-juego {
            transition: transform 0.2s;
            text-decoration: none;
            color: inherit;
        }

        .card-juego:hover {
            transform: translateY(-5px);
        }
    </style>
</head>

<body>
    <main class="container py-5">
        <h1 class="display-3 text-center mb-5 fw-bold text-primary">Juegos en Familia 🏠</h1>

        <div class="row mb-5">
            <div class="col-12">
                <div class="card shadow-sm p-4">
                    <h2 class="h4 mb-4 text-muted">Configuración de Equipos</h2>
                    <div class="row g-3">
                        <div class="col-md-6 col-lg-3">
                            <div class="p-3 border rounded bg-light border-primary border-2">
                                <label class="form-label fw-bold text-primary">Equipo 1 (Azul)</label>
                                <input type="text" id="name-1" class="form-control mb-2" value="Equipo 1">
                                <textarea id="members-1" class="form-control form-control-sm"
                                    placeholder="Integrantes..."></textarea>
                            </div>
                        </div>
                        <div class="col-md-6 col-lg-3">
                            <div class="p-3 border rounded bg-light border-danger border-2">
                                <label class="form-label fw-bold text-danger">Equipo 2 (Rojo)</label>
                                <input type="text" id="name-2" class="form-control mb-2" value="Equipo 2">
                                <textarea id="members-2" class="form-control form-control-sm"
                                    placeholder="Integrantes..."></textarea>
                            </div>
                        </div>
                        <div class="col-md-6 col-lg-3">
                            <div class="p-3 border rounded bg-light border-success border-2">
                                <label class="form-label fw-bold text-success">Equipo 3 (Verde)</label>
                                <input type="text" id="name-3" class="form-control mb-2" value="Equipo 3">
                                <textarea id="members-3" class="form-control form-control-sm"
                                    placeholder="Integrantes..."></textarea>
                            </div>
                        </div>
                        <div class="col-md-6 col-lg-3">
                            <div class="p-3 border rounded bg-light border-warning border-2">
                                <label class="form-label fw-bold text-warning">Equipo 4 (Amarillo)</label>
                                <input type="text" id="name-4" class="form-control mb-2" value="Equipo 4">
                                <textarea id="members-4" class="form-control form-control-sm"
                                    placeholder="Integrantes..."></textarea>
                            </div>
                        </div>
                    </div>
                    <button onclick="guardarConfiguracion()" class="btn btn-dark mt-4 w-100 py-2 fs-5">💾 Guardar
                        Equipos</button>
                </div>
            </div>
        </div>

        <div class="row g-4 text-center">
            <div class="col-md-6">
                <a href="./Pages/pulsadores.html" class="card card-juego h-100 shadow-sm p-5 border-4 border-primary">
                    <span class="display-1">🎵</span>
                    <h3 class="display-6 fw-bold mt-3">Adivina la Canción</h3>
                </a>
            </div>
            <div class="col-md-6">
                <a href="./Pages/imitar-animal.html" class="card card-juego h-100 shadow-sm p-5 border-4 border-success">
                    <span class="display-1">🦁</span>
                    <h3 class="display-6 fw-bold mt-3">Imitando Animales</h3>
                </a>
            </div>
            <div class="col-md-4">
                <a href="./Pages/adivina-animal.html" class="card card-juego h-100 shadow-sm p-5 border-4 border-info">
                    <span class="display-1">❓</span>
                    <h3 class="display-6 fw-bold mt-3">¿Qué animal es?</h3>
                    <p class="text-muted fs-5">Escuchá el sonido y adiviná.</p>
                </a>
            </div>
        </div>
    </main>

    <script>
        function guardarConfiguracion() {
            const config = {
                equipo1: { nombre: document.getElementById('name-1').value || "Equipo 1" },
                equipo2: { nombre: document.getElementById('name-2').value || "Equipo 2" },
                equipo3: { nombre: document.getElementById('name-3').value || "Equipo 3" },
                equipo4: { nombre: document.getElementById('name-4').value || "Equipo 4" }
            };
            localStorage.setItem('configJuego', JSON.stringify(config));
            alert("¡Equipos guardados! Ya pueden elegir un juego abajo.");
        }
    </script>
</body>

</html>
