<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Juegos en Familia</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./style/estilos.css">
    <main class="container py-5">
        <h1 class="display-3 text-center mb-5 fw-bold text-primary">Juegos en Familia 🏠</h1>

        <div class="row mb-5">
            <div class="col-12">
                <div class="card shadow-sm p-4">
                    <h2 class="h4 mb-4 text-muted">Configuración de Equipos</h2>
                    <div class="row g-3" id="config-equipos">
                        <div class="col-md-6 col-lg-3">
                            <div class="p-3 border rounded bg-light">
                                <label class="form-label fw-bold" style="color: #3498db;">Equipo 1</label>
                                <input type="text" id="name-1" class="form-control mb-2"
                                    placeholder="Nombre (ej: Los Cracks)">
                                <textarea id="members-1" class="form-control form-control-sm"
                                    placeholder="Integrantes (Juan, Leo...)"></textarea>
                            </div>
                        </div>
                    </div>
                    <button onclick="guardarConfiguracion()" class="btn btn-dark mt-3 w-100 py-2">💾 Guardar
                        Cambios</button>
                </div>
            </div>
        </div>

        <div class="row g-4 text-center">
            <div class="col-md-6">
                <a href="./Pages/pulsadores.html" class="card h-100 shadow btn btn-outline-primary p-5 border-4">
                    <span class="display-1">🎵</span>
                    <h3 class="display-6 fw-bold">Adivina la Canción</h3>
                    <p>Usa el celu como pulsador y adivina el hit.</p>
                </a>
            </div>
            <div class="col-md-6">
                <a href="./Pages/animales.html" class="card h-100 shadow btn btn-outline-success p-5 border-4">
                    <span class="display-1">🦁</span>
                    <h3 class="display-6 fw-bold">Imitando Animales</h3>
                    <p>Duelos de mímica y sonidos reales.</p>
                </a>
            </div>
        </div>
    </main>
    <script src="js/menu.js"></script>
    </body>

</html>
