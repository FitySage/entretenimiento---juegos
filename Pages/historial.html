<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Salón de la Fama</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white p-5">
    
    <div class="container bg-secondary bg-opacity-25 p-5 rounded-4 shadow-lg">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1 class="display-4 text-warning fw-bold">🏆 Salón de la Fama</h1>
            <a href="../index.html" class="btn btn-outline-light btn-lg">⬅ Volver</a>
        </div>

        <table class="table table-dark table-hover table-striped align-middle text-center fs-5">
            <thead>
                <tr>
                    <th>#</th>
                    <th>Campeón</th>
                    <th>Puntaje</th>
                    <th>Juego</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody id="tabla-historial">
            </tbody>
        </table>

        <div class="text-end mt-4">
            <button onclick="borrarHistorial()" class="btn btn-outline-danger">🗑️ Borrar Historial</button>
        </div>
    </div>

    <script src="../js/historial.js"></script>
    <script>
        // Apenas carga la página, le decimos que dibuje la tabla
        renderizarHistorial('tabla-historial');
    </script>
</body>
</html>
