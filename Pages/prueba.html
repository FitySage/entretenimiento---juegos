<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Scanner Pro: Playlist Validator</title>
    <style>
        body { background: #121212; color: #e0e0e0; font-family: 'Cascadia Code', monospace; padding: 20px; }
        .container { display: flex; gap: 20px; }
        
        #player-container { 
            width: 300px; height: 168px; 
            background: #000; border: 2px solid #444;
            position: sticky; top: 20px;
        }

        .log-panel { flex-grow: 1; background: #1e1e1e; border-radius: 8px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; border-bottom: 2px solid #333; padding: 10px; color: #888; }
        td { padding: 8px 10px; border-bottom: 1px solid #222; font-size: 13px; }
        
        .status-ready { color: #00ff88; }
        .status-error { color: #ff4444; font-weight: bold; }
        .status-testing { color: #ffaa00; animation: blink 1s infinite; }
        
        @keyframes blink { 50% { opacity: 0.5; } }
        
        textarea { width: 100%; height: 80px; background: #222; color: #fff; border: 1px solid #444; padding: 10px; margin-bottom: 10px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; }
        button:disabled { background: #444; }
    </style>
</head>
<body>

    <h2>🚀 Batch Audio Scanner</h2>
    <p>Pegá los IDs separados por coma:</p>
    <textarea id="idInput">L7TN-IV5Tg4, dQw4w9WgXcQ, 9bZkp7q19f0, invalid_id_test</textarea>
    <button id="startBtn" onclick="startValidation()">INICIAR ESCANEO DE LISTA</button>

    <div class="container" style="margin-top: 20px;">
        <div id="player-container">
            <div id="player"></div>
        </div>

        <div class="log-panel">
            <h3>Reporte de Compatibilidad</h3>
            <table>
                <thead>
                    <tr>
                        <th>Video ID</th>
                        <th>Estado</th>
                        <th>Resultado / Error</th>
                    </tr>
                </thead>
                <tbody id="reportTable">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        let player;
        let videoQueue = [];
        let currentIndex = -1;
        let results = [];

        // Inicializar API
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            console.log("API Lista");
        }

        function startValidation() {
            const input = document.getElementById('idInput').value;
            videoQueue = input.split(',').map(s => s.trim()).filter(s => s);
            if (videoQueue.length === 0) return;

            document.getElementById('reportTable').innerHTML = "";
            document.getElementById('startBtn').disabled = true;
            currentIndex = -1;
            nextVideo();
        }

        function nextVideo() {
            currentIndex++;
            if (currentIndex >= videoQueue.length) {
                document.getElementById('startBtn').disabled = false;
                return alert("Escaneo finalizado");
            }

            const currentId = videoQueue[currentIndex];
            initPlayer(currentId);
        }

        function initPlayer(id) {
            // Limpiar frame anterior si existe
            if (player) player.destroy();

            // Crear fila en la tabla
            const row = document.createElement('tr');
            row.id = `row-${id}`;
            row.innerHTML = `<td>${id}</td><td class="status-testing">PROBANDO...</td><td>-</td>`;
            document.getElementById('reportTable').appendChild(row);

            player = new YT.Player('player', {
                height: '168', width: '300', videoId: id,
                playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1 }, // Mute para no volverte loco
                events: {
                    'onStateChange': (e) => {
                        if (e.data === 1) { // PLAYING
                            updateRow(id, 'READY', 'status-ready', 'Funciona OK');
                            setTimeout(nextVideo, 1000); // Espera un segundo y pasa al siguiente
                        }
                    },
                    'onError': (e) => {
                        const errorMap = { 2: 'ID Inválido', 5: 'HTML5 Error', 100: 'No encontrado', 101: 'Bloqueado (No Embebible)', 150: 'Bloqueado (Copyright/Vevo)' };
                        updateRow(id, 'ERROR', 'status-error', errorMap[e.data] || 'Error desconocido');
                        nextVideo();
                    }
                }
            });
        }

        function updateRow(id, status, className, detail) {
            const row = document.getElementById(`row-${id}`);
            if (row) {
                row.cells[1].className = className;
                row.cells[1].innerText = status;
                row.cells[2].innerText = detail;
            }
        }
    </script>
</body>
</html>
