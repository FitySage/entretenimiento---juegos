<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡A Imitar!</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style/estilos.css">
    <style>
        body { background-color: #2c1a2c; color: white; } /* Un fondo un poco más violeta para diferenciarlo */
        .caja-escenario {
            background: linear-gradient(145deg, #4a235a, #6c3483);
            border-radius: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        }
        .icono-gigante { font-size: 8rem; text-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .texto-animal { font-size: 4rem; font-weight: bold; text-transform: uppercase; color: #f1c40f; }
        
        @media (min-width: 1200px) {
            .icono-gigante { font-size: 12rem; }
            .texto-animal { font-size: 6rem; }
        }

        /* Botones de puntaje pequeños */
        .btn-punto { width: 40px; height: 40px; padding: 0; display: inline-flex; align-items: center; justify-content: center; font-weight: bold;}
    </style>
</head>
<body class="overflow-hidden">
    <main class="container-fluid vh-100 d-flex flex-column justify-content-between p-4 text-center">
        
        <header class="row mt-2">
            <div class="col-12 d-flex justify-content-between align-items-center">
                <a href="../index.html" class="btn btn-outline-light btn-lg">⬅ Volver</a>
                <button id="btn-finalizar" class="btn btn-danger btn-lg shadow rounded-pill">🏆 Terminar y Guardar</button>
            </div>
        </header>

        <section class="row flex-grow-1 align-items-center justify-content-center mt-2">
            <div class="col-12 col-md-8 caja-escenario p-4">
                <h2 class="display-6 text-info mb-3" id="titulo-estado">¡Prepárense para imitar al...</h2>
                <div class="icono-gigante mb-2" id="grafico-centro">🎭</div>
                <div class="texto-animal" id="nombre-animal">ANIMAL</div>
            </div>
        </section>

        <div class="row justify-content-center g-3 mb-4" id="contenedor-puntajes">
            </div>

        <footer class="row pb-3 justify-content-center gap-3">
            <div class="col-auto">
                <button id="btn-reproducir" class="btn btn-primary btn-lg shadow fs-2 px-5 py-3 rounded-pill">
                    🔊 Escuchar Sonido Real
                </button>
            </div>
            <div class="col-auto">
                <button id="btn-siguiente" class="btn btn-success btn-lg shadow fs-2 px-5 py-3 rounded-pill">
                    Siguiente Animal ➡
                </button>
            </div>
        </footer>
    </main>

    <script src="../js/historial.js"></script>
    <script src="../js/imitar.js"></script>
</body>
</html>
