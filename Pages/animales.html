<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imitando Animales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
    </style>
</head>
<body class="overflow-hidden">
    <main class="container-fluid vh-100 d-flex flex-column justify-content-between p-4 text-center">
        
        <header class="row mt-3">
            <div class="col-12">
                <a href="../index.html" class="btn btn-outline-secondary float-start">⬅ Volver al Menú</a>
                <h3 class="text-muted fw-bold d-inline-block">Ronda de Imitación</h3>
            </div>
        </header>

        <section class="row flex-grow-1 align-items-center">
            <div class="col-12">
                <h1 class="display-1 fw-bold text-dark mb-4" id="nombre-animal">¿?</h1>
                <div class="display-1 fw-bold text-danger" id="temporizador">20</div>
                <p class="fs-4 text-muted mt-2">Segundos</p>
            </div>
        </section>

        <footer class="row pb-5 justify-content-center">
            <div class="col-auto">
                <button id="btn-sortear" class="btn btn-primary btn-lg shadow fs-2 px-5 py-3 rounded-pill">🎲 Sortear Animal</button>
                <button id="btn-revelar" class="btn btn-success btn-lg shadow fs-2 px-5 py-3 rounded-pill d-none">🔊 Revelar Sonido</button>
            </div>
        </footer>
    </main>

    <div class="modal fade" id="modalVotacion" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content text-center p-5">
                <h2 class="display-5 mb-4">¡Tiempo! ¿Puntaje?</h2>
                <h4 id="texto-turno-voto" class="text-primary mb-4">Vota el equipo...</h4>
                <div class="d-flex justify-content-between flex-wrap gap-2" id="panel-votos"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        const animales = [
            { nombre: "León", folder: "leon", prefijo: "leon_v" },
            { nombre: "Elefante", folder: "elefante", prefijo: "elefante_v" }
        ];

        const txtAnimal = document.getElementById('nombre-animal');
        const txtTiempo = document.getElementById('temporizador');
        const btnSortear = document.getElementById('btn-sortear');
        const btnRevelar = document.getElementById('btn-revelar');
        const textoTurnoVoto = document.getElementById('texto-turno-voto');
        const panelVotos = document.getElementById('panel-votos');
        
        let modalVotacion; 
        document.addEventListener("DOMContentLoaded", () => {
            modalVotacion = new bootstrap.Modal(document.getElementById('modalVotacion'));
        });

        let tiempo = 20;
        let intervaloTimer;
        let animalSeleccionado = null;

        // Al tocar Sortear
        btnSortear.addEventListener('click', () => {
            const indice = Math.floor(Math.random() * animales.length);
            animalSeleccionado = animales[indice];
            txtAnimal.innerText = animalSeleccionado.nombre;
            
            btnSortear.classList.add('d-none');
            tiempo = 20;
            txtTiempo.innerText = tiempo;
            
            intervaloTimer = setInterval(() => {
                tiempo--;
                txtTiempo.innerText = tiempo;
                if (tiempo <= 0) {
                    clearInterval(intervaloTimer);
                    txtTiempo.innerText = "¡TIEMPO!";
                    iniciarVotacion();
                }
            }, 1000);
        });

        // Lógica de Votación
        let equiposVotantes = ['Equipo 2', 'Equipo 3', 'Equipo 4']; // Ejemplo fijo
        let indiceVoto = 0;
        let puntajeTotal = 0;

        // Crear botones del 1 al 10
        for (let i = 1; i <= 10; i++) {
            const btn = document.createElement('button');
            btn.className = 'btn btn-outline-primary flex-fill fs-1 py-3 fw-bold m-1';
            btn.innerText = i;
            btn.onclick = () => registrarVoto(i);
            panelVotos.appendChild(btn);
        }

        function iniciarVotacion() {
            indiceVoto = 0;
            puntajeTotal = 0;
            modalVotacion.show();
            siguienteVotante();
        }

        function siguienteVotante() {
            if (indiceVoto >= equiposVotantes.length) {
                modalVotacion.hide();
                btnRevelar.classList.remove('d-none'); // Muestra botón revelar
                alert(`¡El imitador consiguió ${puntajeTotal} puntos en total!`);
                return;
            }
            textoTurnoVoto.innerText = `Turno de votar: ${equiposVotantes[indiceVoto]}`;
        }

        function registrarVoto(puntos) {
            puntajeTotal += puntos;
            indiceVoto++;
            siguienteVotante();
        }

        // Al tocar Revelar Sonido
        btnRevelar.addEventListener('click', () => {
            if (!animalSeleccionado) return;
            const variante = Math.floor(Math.random() * 3) + 1;
            const ruta = `assets/sounds/animales/${animalSeleccionado.folder}/${animalSeleccionado.prefijo}${variante}.mp3`;
            
            // Acá iria el audioReal.play(). Dejo el log para que veas que funciona:
            console.log("Reproduciendo el audio desde:", ruta);
            
            // Reset de botones para la siguiente ronda
            btnRevelar.classList.add('d-none');
            btnSortear.classList.remove('d-none');
            txtAnimal.innerText = "¿?";
            txtTiempo.innerText = "20";
        });
    </script>
</body>
</html>
