<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Imitando Animales</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="../style/estilos.css">
</head>
<body class="bg-light overflow-hidden">

    <main class="container-fluid vh-100 d-flex flex-column justify-content-between p-4">
        
        <header class="row align-items-center mb-4">
            <div class="col-4">
                <button class="btn btn-outline-secondary btn-lg">⬅ Volver al Menú</button>
            </div>
            <div class="col-4 text-center">
                <h3 class="text-muted text-uppercase fw-bold">Ronda 1</h3>
            </div>
            <div class="col-4 text-end">
                <span class="badge bg-primary fs-4">Eq 1: 20</span>
                <span class="badge bg-danger fs-4">Eq 2: 15</span>
            </div>
        </header>

        <section class="row flex-grow-1 align-items-center text-center">
            <div class="col-12">
                
                <h2 class="display-6 text-muted mb-3" id="turno-jugador">Turno de: ¡Equipo 1!</h2>
                
                <h1 class="display-1 fw-bold text-dark mb-5" id="nombre-animal">¿?</h1>
                
                <div class="display-1 fw-bold text-danger" id="temporizador">20</div>
                <p class="fs-4 text-muted mt-2">Segundos restantes</p>
                
            </div>
        </section>

        <footer class="row justify-content-center pb-4">
            <div class="col-auto">
                <button id="btn-sortear" class="btn btn-primary btn-lg shadow fs-3 px-5 py-3 rounded-pill">
                    🎲 Sortear Animal
                </button>
            </div>
            <div class="col-auto">
                <button id="btn-revelar" class="btn btn-success btn-lg shadow fs-3 px-5 py-3 rounded-pill d-none">
                    🔊 Revelar Sonido Real
                </button>
            </div>
        </footer>

    </main>

    <div class="modal fade" id="modalVotacion" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content text-center p-5">
                <h2 class="display-5 mb-4">¡Tiempo! ¿Qué puntaje le dan?</h2>
                <div class="d-flex justify-content-between flex-wrap gap-2" id="panel-votos">
                    </div>
            </div>
        </div>
    </div>
<script src="js/animales.js"></script>
</body>
</html>
