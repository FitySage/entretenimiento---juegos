<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Qué animal es?</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #1a252c; color: white; } /* Fondo oscuro de misterio */
        
        .caja-misterio {
            background: linear-gradient(145deg, #2c3e50, #34495e);
            border-radius: 30px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            transition: all 0.5s ease;
        }

        .icono-gigante { font-size: 8rem; text-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .texto-revelado { font-size: 4rem; font-weight: bold; text-transform: uppercase; color: #f1c40f; }
        
        @media (min-width: 1200px) {
            .icono-gigante { font-size: 15rem; }
            .texto-revelado { font-size: 8rem; }
        }

        /* Animación de latido para el botón de escuchar */
        @keyframes latido {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        .btn-latido { animation: latido 2s infinite; }
    </style>
</head>
<body class="overflow-hidden">
    <main class="container-fluid vh-100 d-flex flex-column justify-content-between p-4 text-center">
        
        <header class="row mt-3">
            <div class="col-12 text-start">
                <a href="../index.html" class="btn btn-outline-light btn-lg">⬅ Volver al Menú</a>
            </div>
        </header>

        <section class="row flex-grow-1 align-items-center justify-content-center">
            <div class="col-12 col-md-8 caja-misterio p-5">
                
                <h2 class="display-5 text-info mb-4" id="titulo-estado">¿Quién hace este sonido?</h2>
                
                <div class="icono-gigante mb-3" id="grafico-centro">❓</div>
                
                <div class="texto-revelado d-none" id="nombre-animal">LEÓN</div>

            </div>
        </section>

        <footer class="row pb-5 justify-content-center gap-3">
            <div class="col-auto">
                <button id="btn-reproducir" class="btn btn-primary btn-lg shadow fs-1 px-5 py-4 rounded-pill btn-latido">
                    🔊 Escuchar Sonido
                </button>
            </div>
            <div class="col-auto">
                <button id="btn-revelar" class="btn btn-warning btn-lg shadow fs-1 px-5 py-4 rounded-pill d-none text-dark fw-bold">
                    👀 Revelar Animal
                </button>
            </div>
            <div class="col-auto">
                <button id="btn-siguiente" class="btn btn-success btn-lg shadow fs-1 px-5 py-4 rounded-pill d-none">
                    Siguiente ➡
                </button>
            </div>
        </footer>
    </main>

    <script>
        // Tu base de datos de animales. Agregamos un emoji para que sea más visual al revelar.
        const animales = [
            { nombre: "León", emoji: "🦁", audio: "assets/sounds/animales/leon/leon_v1.mp3" },
            { nombre: "Elefante", emoji: "🐘", audio: "assets/sounds/animales/elefante/elefante_v1.mp3" },
            { nombre: "Caballo", emoji: "🐴", audio: "assets/sounds/animales/caballo/caballo_v1.mp3" },
            { nombre: "Perro", emoji: "🐶", audio: "assets/sounds/animales/perro/perro_v1.mp3" }
        ];

        // Variables de estado
        let animalActual = null;
        const reproductor = new Audio();

        // Elementos de la pantalla
        const graficoCentro = document.getElementById('grafico-centro');
        const nombreAnimal = document.getElementById('nombre-animal');
        const tituloEstado = document.getElementById('titulo-estado');
        
        const btnReproducir = document.getElementById('btn-reproducir');
        const btnRevelar = document.getElementById('btn-revelar');
        const btnSiguiente = document.getElementById('btn-siguiente');

        // Función para preparar una nueva ronda
        function nuevaRonda() {
            // Elegimos un animal al azar
            const indice = Math.floor(Math.random() * animales.length);
            animalActual = animales[indice];
            reproductor.src = animalActual.audio;

            // Reseteamos la pantalla al modo "Misterio"
            graficoCentro.innerText = "❓";
            nombreAnimal.classList.add('d-none');
            tituloEstado.innerText = "¿Quién hace este sonido?";
            
            // Acomodamos los botones
            btnReproducir.classList.remove('d-none');
            btnReproducir.classList.add('btn-latido'); // Vuelve a latir
            btnRevelar.classList.add('d-none');
            btnSiguiente.classList.add('d-none');
        }

        // Al tocar "Escuchar Sonido"
        btnReproducir.addEventListener('click', () => {
            if (!animalActual) return;
            
            // Reproducimos el sonido
            reproductor.play().catch(err => console.error("Error de ruta de audio:", err));
            
            // Frenamos el latido del botón y mostramos el botón de revelar
            btnReproducir.classList.remove('btn-latido');
            btnRevelar.classList.remove('d-none');
        });

        // Al tocar "Revelar Animal"
        btnRevelar.addEventListener('click', () => {
            // Cambiamos el signo de pregunta por el emoji
            graficoCentro.innerText = animalActual.emoji;
            
            // Mostramos el nombre gigante
            nombreAnimal.innerText = animalActual.nombre;
            nombreAnimal.classList.remove('d-none');
            
            tituloEstado.innerText = "¡Era el...";
            
            // Acomodamos los botones
            btnReproducir.classList.add('d-none');
            btnRevelar.classList.add('d-none');
            btnSiguiente.classList.remove('d-none');
        });

        // Al tocar "Siguiente"
        btnSiguiente.addEventListener('click', () => {
            nuevaRonda();
        });

        // Arrancamos la primera ronda apenas carga la página
        nuevaRonda();
    </script>
</body>
</html>
