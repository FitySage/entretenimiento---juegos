<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Qué animal es?</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #1a252c;
            color: white;
        }

        /* Fondo oscuro de misterio */

        .caja-misterio {
            background: linear-gradient(145deg, #2c3e50, #34495e);
            border-radius: 30px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.5s ease;
        }

        .icono-gigante {
            font-size: 8rem;
            text-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .texto-revelado {
            font-size: 4rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #f1c40f;
        }

        @media (min-width: 1200px) {
            .icono-gigante {
                font-size: 15rem;
            }

            .texto-revelado {
                font-size: 8rem;
            }
        }

        /* Animación de latido para el botón de escuchar */
        @keyframes latido {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }

            100% {
                transform: scale(1);
            }
        }

        .btn-latido {
            animation: latido 2s infinite;
        }
    </style>
</head>

<body class="overflow-hidden">
    <main class="container-fluid vh-100 d-flex flex-column justify-content-between p-4 text-center">

        <<header class="row mt-3">
            <div class="col-12 d-flex justify-content-between align-items-center">
                <a href="../index.html" class="btn btn-outline-light btn-lg">⬅ Volver al Menú</a>
                <button id="btn-finalizar" class="btn btn-danger btn-lg shadow rounded-pill">🏆 Terminar y Guardar</button>
            </div>
        </header>

        <section class="row flex-grow-1 align-items-center justify-content-center">
            <div class="col-12 col-md-8 caja-misterio p-5">

                <h2 class="display-5 text-info mb-4" id="titulo-estado">¿Quién hace este sonido?</h2>

                <div class="icono-gigante mb-3" id="grafico-centro">❓</div>

                <div class="texto-revelado d-none" id="nombre-animal">LEÓN</div>

            </div>
        </section>

        <footer class="row pb-5 justify-content-center gap-3">
            <div class="col-auto">
                <button id="btn-reproducir"
                    class="btn btn-primary btn-lg shadow fs-1 px-5 py-4 rounded-pill btn-latido">
                    🔊 Escuchar Sonido
                </button>
            </div>
            <div class="col-auto">
                <button id="btn-revelar"
                    class="btn btn-warning btn-lg shadow fs-1 px-5 py-4 rounded-pill d-none text-dark fw-bold">
                    👀 Revelar Animal
                </button>
            </div>
            <div class="col-auto">
                <button id="btn-siguiente" class="btn btn-success btn-lg shadow fs-1 px-5 py-4 rounded-pill d-none">
                    Siguiente ➡
                </button>
            </div>
            <div class="container mb-4">
                <div class="row justify-content-center g-2" id="contenedor-puntajes">
                </div>
            </div>
        </footer>
    </main>

    <script src="../js/historial.js"></script>
    <script src="../js/animales.js"></script>
</body>

</html>
