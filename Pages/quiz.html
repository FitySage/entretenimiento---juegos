<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Familiar</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style/estilos.css">
    <style>
        body { background-color: #1b263b; color: white; }
        
        .caja-pregunta {
            background: linear-gradient(145deg, #415a77, #778da9);
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .texto-pregunta { font-size: 2.5rem; font-weight: bold; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        
        .btn-opcion {
            font-size: 1.5rem;
            padding: 15px;
            border-radius: 15px;
            transition: transform 0.2s;
        }
        .btn-opcion:active { transform: scale(0.95); }

        .btn-equipo { font-size: 1.5rem; padding: 20px; border-radius: 20px; font-weight: bold; }
        .bloqueado { opacity: 0.4; pointer-events: none; filter: grayscale(100%); }

        @media (min-width: 992px) {
            .texto-pregunta { font-size: 4rem; }
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 p-3 text-center">
    
    <header class="row mb-3">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <a href="../index.html" class="btn btn-outline-light btn-lg">⬅ Volver</a>
            <div id="contador-preguntas" class="fs-4 fw-bold text-info">Preguntas: ?</div>
            <button id="btn-finalizar" class="btn btn-danger btn-lg shadow rounded-pill">🏆 Terminar y Guardar</button>
        </div>
    </header>

    <section class="row justify-content-center mb-4">
        <div class="col-12 col-md-10 caja-pregunta p-4">
            <div class="texto-pregunta" id="texto-pregunta">Cargando pregunta...</div>
        </div>
    </section>

    <h3 id="mensaje-estado" class="text-warning mb-3">¡Esperando que un equipo pulse!</h3>

    <div class="row justify-content-center g-3 mb-4" id="contenedor-pulsadores">
        </div>

    <div class="row justify-content-center g-3 mb-4 d-none" id="contenedor-opciones">
        <div class="col-12 col-md-6"><button class="btn btn-light w-100 btn-opcion shadow" onclick="verificarRespuesta(0)" id="op-0">Opción A</button></div>
        <div class="col-12 col-md-6"><button class="btn btn-light w-100 btn-opcion shadow" onclick="verificarRespuesta(1)" id="op-1">Opción B</button></div>
        <div class="col-12 col-md-6"><button class="btn btn-light w-100 btn-opcion shadow" onclick="verificarRespuesta(2)" id="op-2">Opción C</button></div>
        <div class="col-12 col-md-6"><button class="btn btn-light w-100 btn-opcion shadow" onclick="verificarRespuesta(3)" id="op-3">Opción D</button></div>
    </div>

    <div class="row justify-content-center">
        <div class="col-auto">
            <button id="btn-siguiente" class="btn btn-success btn-lg px-5 py-3 rounded-pill fs-2 d-none shadow">
                Siguiente Pregunta ➡
            </button>
        </div>
    </div>

    <div class="fixed-bottom p-2 bg-dark bg-opacity-75 d-flex justify-content-around" id="mini-puntos">
        </div>

    <script src="../js/historial.js"></script>
    <script src="../js/quiz.js"></script>
</body>
</html>
