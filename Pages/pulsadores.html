<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adivina la Canción</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style/estilos.css">
    <style>
        body {
            background-color: #1a1a2e;
            color: white;
        }

        .btn-pulsador {
            height: 150px;
            font-size: 2rem;
            border-radius: 30px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .btn-pulsador:active {
            transform: scale(0.95);
        }

        .bloqueado {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(100%);
        }

        .ganador-ronda {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
            z-index: 10;
        }

        .reproductor-fantasma {
            position: absolute;
            top: -9999px;
            left: -9999px;
            width: 1px;
            height: 1px;
            overflow: hidden;
        }

        /* Estilo para el temporizador */
        .reloj-gigante {
            font-size: 4rem;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }
    </style>
</head>

<body class="d-flex flex-column min-vh-100 p-3 text-center">

    <header class="row mb-3">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <a href="../index.html" class="btn btn-outline-light btn-lg">⬅ Volver</a>
            <h3 class="text-info m-0" id="contador-canciones">Seleccioná una categoría</h3>
            <button id="btn-finalizar" class="btn btn-danger btn-lg shadow rounded-pill">🏆 Terminar</button>
        </div>
    </header>

    <section id="seleccion-categoria" class="flex-grow-1 d-flex flex-column justify-content-center align-items-center">
        <h1 class="display-4 mb-5 text-warning fw-bold">¿Qué van a escuchar?</h1>
        <div class="d-flex gap-4 flex-wrap justify-content-center">
            <button onclick="iniciarCategoria('rock')"
                class="btn btn-outline-light btn-lg px-5 py-4 fs-2 rounded-pill shadow">🎸 Rock</button>
            <button onclick="iniciarCategoria('pop')"
                class="btn btn-outline-light btn-lg px-5 py-4 fs-2 rounded-pill shadow">🎤 Pop</button>
            <button onclick="iniciarCategoria('los8090s')"
                class="btn btn-outline-light btn-lg px-5 py-4 fs-2 rounded-pill shadow">📼 80s & 90s</button>
            <button onclick="iniciarCategoria('pendejada')"
                class="btn btn-outline-light btn-lg px-5 py-4 fs-2 rounded-pill shadow">🎧 Pendejada</button>
            <button onclick="iniciarCategoria('Disney')"
                class="btn btn-outline-light btn-lg px-5 py-4 fs-2 rounded-pill shadow">🏰 Disney - Intantiles</button>
        </div>
    </section>

    <section id="juego-musica" class="flex-grow-1 d-flex flex-column justify-content-around d-none">

        <div class="reproductor-fantasma">
            <div id="yt-player"></div>
        </div>

        <div class="row justify-content-center mb-2">
            <div class="col-12">
                <div id="temporizador-display" class="reloj-gigante text-white d-none">45</div>
            </div>
            <div class="col-auto mt-2">
                <button id="btn-reproducir" class="btn btn-primary btn-lg shadow fs-1 px-5 py-3 rounded-pill">
                    ▶️ Reproducir Canción
                </button>
            </div>
        </div>

        <h2 id="mensaje-estado" class="text-warning mb-2">¡Escuchen atentamente!</h2>

        <div class="row justify-content-center g-3 mb-3" id="contenedor-pulsadores">
        </div>

        <div class="row justify-content-center g-2 d-none" id="controles-presentador">
            <div class="col-12 d-flex flex-wrap justify-content-center gap-2 mb-2">
                <button id="btn-exacto" class="btn btn-success btn-lg fs-4 shadow">✅ Nombre (+10)</button>
                <button id="btn-artista" class="btn btn-info btn-lg fs-4 shadow">🎤 Artista (+7)</button>
                <button id="btn-melodia" class="btn btn-warning btn-lg text-dark fs-4 shadow">🎶 Melodía (+5)</button>
            </div>
            <div class="col-12 d-flex flex-wrap justify-content-center gap-2 mb-3">
                <button id="btn-incorrecto" class="btn btn-danger btn-lg fs-4 shadow">❌ Erró (-2 pts)</button>
                <button id="btn-siguiente" class="btn btn-secondary btn-lg fs-4 shadow">⏭️ Pasar Tema</button>
            </div>
            <div class="col-12" style="margin-top: 10vh; padding-bottom: 120px;">
                <p class="text-secondary small mb-1">Respuesta del DJ 👇</p>
                <span class="badge bg-dark text-info fs-5 border border-secondary p-3"
                    id="respuesta-secreta">Cargando...</span>
            </div>
        </div>

        <div class="row justify-content-center g-2 d-none" id="controles-tiempo-agotado">
            <div class="col-12 mb-3">
                <h3 class="text-danger fw-bold display-5">¡TIEMPO AGOTADO!</h3>
                <h4 class="text-light bg-dark border border-warning p-3 rounded-3 shadow" id="respuesta-tiempo-agotado">
                    La canción era...</h4>
            </div>
            <div class="col-12 mb-2">
                <h5 class="text-warning">¿Qué equipo estuvo más cerca? (+2 puntos)</h5>
            </div>

            <div class="col-12 d-flex flex-wrap justify-content-center gap-2 mb-4" id="botones-mas-cerca">
            </div>

            <div class="col-12 pb-5">
                <button id="btn-nadie-cerca" class="btn btn-secondary btn-lg px-5 shadow">Nadie (Siguiente Tema
                    ⏭️)</button>
            </div>
        </div>

        <div class="fixed-bottom p-2 bg-dark bg-opacity-75 d-flex justify-content-around fs-5" id="mini-puntos"></div>
    </section>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="../js/historial.js"></script>
    <script src="../js/pulsadores.js"></script>
</body>

</html>
