<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego Didáctico</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style/estilos.css">
    <style>
        body { background-color: #0d3b66; color: white; }
        
        .caja-pregunta {
            background: linear-gradient(145deg, #f4d06f, #ffb703);
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            color: #023047;
            font-weight: bold;
        }

        .texto-gigante { font-size: 5rem; text-shadow: 2px 2px 5px rgba(255,255,255,0.5); }
        @media (min-width: 992px) { .texto-gigante { font-size: 8rem; } }

        /* MAGIA CSS: La imagen de sombra y revelación */
        .imagen-magica {
            width: 100%;
            max-width: 350px;
            object-fit: contain;
            margin: 0 auto;
        }
        
        .animal-oculto {
            filter: brightness(0); /* Lo vuelve 100% negro */
            transition: filter 10s linear; /* Tarda 10 segundos en cambiar */
        }

        .animal-revelado {
            filter: brightness(1); /* Recupera su color original */
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100 p-3 text-center">

    <header class="row mb-3">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <a href="../index.html" class="btn btn-outline-light btn-lg">⬅ Volver</a>
            <h3 class="text-warning m-0">🌟 Aventura Didáctica 🌟</h3>
            <button id="btn-finalizar" class="btn btn-danger btn-lg shadow rounded-pill">🏆 Terminar</button>
        </div>
    </header>

    <section id="seleccion-categoria" class="flex-grow-1 d-flex flex-column justify-content-center align-items-center">
        <h1 class="display-3 mb-5 fw-bold text-light">¿A qué vamos a jugar?</h1>
        <div class="d-flex gap-4 flex-wrap justify-content-center">
            <button onclick="iniciarJuego('letras')" class="btn btn-warning btn-lg px-5 py-4 fs-1 rounded-pill shadow fw-bold text-dark">🔤 El Abecedario</button>
            <button onclick="iniciarJuego('colores')" class="btn btn-info btn-lg px-5 py-4 fs-1 rounded-pill shadow fw-bold text-dark">🎨 Los Colores</button>
        </div>
    </section>

    <section id="juego-didactico" class="flex-grow-1 d-flex flex-column justify-content-between d-none">
        
        <div class="row justify-content-center mt-3">
            <div class="col-11 col-md-8 caja-pregunta p-4">
                <h2 id="texto-pregunta" class="display-4 mb-2">Cargando...</h2>
                <div id="elemento-gigante" class="texto-gigante d-none">A</div>
                
                <img id="imagen-misteriosa" src="" alt="Sombra" class="imagen-magica d-none animal-oculto mt-3">
            </div>
        </div>

        <h2 id="mensaje-estado" class="text-info mt-4 fw-bold">¡Digan la respuesta en voz alta!</h2>

        <div class="row justify-content-center g-3 mt-auto mb-4 border-top border-secondary pt-3">
            <div class="col-auto"><button id="btn-fase-sombra" class="btn btn-primary btn-lg px-4 fs-3 shadow">Avanzar a la Pista 🔎</button></div>
            <div class="col-auto"><button id="btn-fase-revelar" class="btn btn-warning btn-lg px-4 fs-3 shadow d-none text-dark fw-bold">⌛ Iniciar Reloj (10s)</button></div>
            <div class="col-auto"><button id="btn-correcto" class="btn btn-success btn-lg px-4 fs-3 shadow d-none">✅ ¡Excelente! (Siguiente) ➡</button></div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="../js/didactico.js"></script>
</body>
</html>
